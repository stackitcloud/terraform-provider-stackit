version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/" 
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      exclude: ["github.com/stackitcloud*"]
    groups:
      stackit:
        patterns:
          - "github.com/stackitcloud/stackit-sdk-go/*"
      terraform:
        patterns:
          - "github.com/hashicorp/*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
        default-days: 7
